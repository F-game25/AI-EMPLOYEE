# AI Employee — Security Configuration Template (from openclaw-2)
# Copy to security.local.yml and customise for your environment.
# security.local.yml is gitignored and will never be committed.

app:
  name: "AI Employee - Private & Secure"
  version: "2.0.0"
  environment: "production"
  debug: false

server:
  host: "127.0.0.1"   # Bind to localhost only — do NOT change to 0.0.0.0
  port: 8787

security:
  # JWT secret — MUST be overridden via JWT_SECRET_KEY env var or security.local.yml.
  # Generate a strong secret: python -c "import secrets; print(secrets.token_hex(32))"
  jwt_secret_key: "CHANGE_THIS_IN_SECURITY_LOCAL_YML_OR_SET_JWT_SECRET_KEY_ENV_VAR"
  jwt_algorithm: "HS256"
  # Short-lived access tokens reduce replay window.
  access_token_expire_minutes: 15
  # Refresh token rotation window (days).
  refresh_token_expire_days: 7
  # Brute-force controls.
  max_login_attempts: 5
  # Progressive lockout durations (seconds) after threshold is exceeded:
  # 1st, 2nd, 3rd, 4th+ lockout windows.
  progressive_lockout_seconds: [60, 300, 900, 1800]

  # Password requirements
  min_password_length: 12
  require_special_chars: true
  require_numbers: true
  require_uppercase: true

  # Rate limiting
  rate_limit_enabled: true
  rate_limit_per_minute: 60

  # CORS — restrict to localhost only
  cors_origins:
    - "http://localhost:8787"
    - "http://127.0.0.1:8787"

  # Session limits
  max_sessions_per_user: 3
  session_timeout_minutes: 60

privacy:
  data_dir: "./data"
  logs_dir: "./logs"

  telemetry_enabled: false
  analytics_enabled: false
  # Set to true to block ALL outbound API calls (maximum privacy mode)
  external_api_calls_disabled: false

  log_retention_days: 30
  session_data_retention_days: 7

  encrypt_data_at_rest: true
  encryption_algorithm: "AES-256-GCM"

ai:
  use_local_model: true
  model_path: "./models"
  max_tokens: 2048
  temperature: 0.7
  # API keys must be set via environment variables — never store them here
  openai_api_key_env: "OPENAI_API_KEY"
  anthropic_api_key_env: "ANTHROPIC_API_KEY"

logging:
  level: "INFO"
  format: "json"
  file_enabled: true
  console_enabled: true

  # Security audit logging — strongly recommended: keep all flags true
  audit_enabled: true
  audit_failed_auth: true
  audit_file_access: true
  audit_api_calls: true

limits:
  max_file_upload_size_mb: 10
  max_concurrent_requests: 10
  max_memory_usage_mb: 1024
  request_timeout_seconds: 30
