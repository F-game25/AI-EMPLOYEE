{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "aeternus-nexus.fullname" . }}-deny-cross-tenant
  labels:
    {{- include "aeternus-nexus.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "aeternus-nexus.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              {{- include "aeternus-nexus.selectorLabels" . | nindent 14 }}
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Release.Namespace }}
    - ports:
        - port: {{ .Values.service.node.port }}
          protocol: TCP
  egress:
    - to:
        - podSelector:
            matchLabels:
              {{- include "aeternus-nexus.selectorLabels" . | nindent 14 }}
    - to: []        # Allow external egress (LLM APIs, integrations)
      ports:
        - port: 443
          protocol: TCP
        - port: 80
          protocol: TCP
    - ports:        # DNS resolution — required for all external hostnames
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
{{- end }}
