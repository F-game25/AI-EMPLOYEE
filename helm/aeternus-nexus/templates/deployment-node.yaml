apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "aeternus-nexus.fullname" . }}-node
  labels:
    app.kubernetes.io/component: node-backend
    {{- include "aeternus-nexus.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.node.enabled }}
  replicas: {{ .Values.replicaCount.node }}
  {{- end }}
  selector:
    matchLabels:
      app.kubernetes.io/component: node-backend
      {{- include "aeternus-nexus.selectorLabels" . | nindent 6 }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 2
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/component: node-backend
        {{- include "aeternus-nexus.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "aeternus-nexus.serviceAccountName" . }}
      securityContext:
        runAsNonRoot: true
        runAsUser: {{ .Values.securityContext.runAsUser }}
        fsGroup: {{ .Values.securityContext.fsGroup }}
      volumes:
        - name: tmp
          emptyDir: {}
      containers:
        - name: node-backend
          image: "{{ .Values.image.repository }}-node:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: {{ .Values.containerSecurityContext.allowPrivilegeEscalation }}
            readOnlyRootFilesystem: {{ .Values.containerSecurityContext.readOnlyRootFilesystem }}
            capabilities:
              drop: {{ toJson .Values.containerSecurityContext.capabilities.drop }}
          ports:
            - containerPort: {{ .Values.service.node.port }}
          envFrom:
            - configMapRef:
                name: {{ include "aeternus-nexus.fullname" . }}-config
          env:
            - name: JWT_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.jwtSecretName }}
                  key: secret
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          resources:
            {{- toYaml .Values.resources.node | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /api/health
              port: {{ .Values.service.node.port }}
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /api/health
              port: {{ .Values.service.node.port }}
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
