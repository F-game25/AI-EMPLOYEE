[pytest]
# AI Employee — pytest configuration
# Coverage data is written to .coverage and to coverage/coverage.xml so that
# AscendForge's scan_system() can locate and parse coverage reports.

testpaths = tests
addopts =
    --tb=short
    --cov=.
    --cov-config=.coveragerc
    --cov-report=term-missing
    --cov-report=xml:coverage/coverage.xml
    --cov-report=json:coverage/coverage.json

# Ignore import errors from server.py and other FastAPI apps that require
# the full install — only pure-Python agents are covered here.
norecursedirs = runtime/agents/problem-solver-ui .git node_modules

filterwarnings =
    ignore::DeprecationWarning
    ignore::UserWarning
