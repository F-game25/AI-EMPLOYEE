name: CI — Test & Deploy

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
      - uses: actions/setup-python@v4
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          npm install --prefix backend
          pip install -r runtime/agents/problem-solver-ui/requirements.txt
          pip install -r requirements-test.txt

      - name: Lint Python code
        run: npm run lint

      - name: Unit tests
        run: python3 -m pytest tests/ -v --tb=short
        env:
          STRICT_PIPELINE: "1"

      - name: Agent self-test
        run: python3 runtime/agents/agent_selftest.py
        timeout-minutes: 5

      - name: Docker build check
        run: docker build -t ai-employee:test . --quiet

      - name: Validate configs
        run: |
          pip install pyyaml
          python3 -c "import yaml; yaml.safe_load(open('docker-compose.yml'))"
          grep -q "limit_req_zone" nginx.conf

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install security tools
        run: |
          pip install bandit safety pip-audit

      - name: Bandit scan
        run: bandit -r runtime/agents -f json -o /tmp/bandit.json || true
        continue-on-error: true

      - name: Safety check
        run: safety check --json || true
        continue-on-error: true

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [test, security]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t ai-employee:${{ github.sha }} .
