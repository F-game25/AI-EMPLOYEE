name: CI

"on":
  push:
    branches: [main]
  pull_request:
    branches: [main]

defaults:
  run:
    shell: bash

permissions:
  contents: read

env:
  STATE_DIR: /tmp/ci-state
  JWT_SECRET_KEY: ci-test-secret-not-real
  STRICT_PIPELINE: "0"
  LOG_LEVEL: WARNING
  EVOLUTION_MODE: "OFF"
  PYTHONPATH: runtime:runtime/agents
  # Pins Python's string-hash seed so hash-based fallback embeddings
  # (runtime/core/memory_index.py) rank identically across CI runs.
  PYTHONHASHSEED: "0"

jobs:
  # ─────────────────────────────────────────────────────────────────
  # PYTHON LINT
  # ─────────────────────────────────────────────────────────────────
  lint-python:
    name: Lint — Python
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install core deps
        run: pip install -r runtime/requirements-core.txt -q

      - name: Syntax-check all runtime Python files
        run: |
          find runtime/ -name '*.py' -print0 | xargs -0 python3 -m py_compile
          echo "py_compile: all files OK"

  # ─────────────────────────────────────────────────────────────────
  # PYTHON TESTS
  # ─────────────────────────────────────────────────────────────────
  test-python:
    name: Test — Python (pytest)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: lint-python

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install runtime + test deps
        run: |
          pip install -r runtime/requirements-core.txt \
                      -r requirements-test.txt -q

      # Some Python tests shell out to Node (forge memory-graph persists via
      # better-sqlite3). Without it ForgeStore's graph methods no-op and the
      # roundtrip tests fail — so provide the same Node backend the node job uses.
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install Node deps for subprocess-backed tests
        run: |
          npm ci
          npm install --no-save better-sqlite3@12.9.0

      - name: Run pytest
        run: |
          python3 -m pytest tests/ \
            -q \
            --timeout=60 \
            --ignore=tests/ui_automation \
            --ignore=tests/ui_e2e \
            -x \
            --tb=short

  # ─────────────────────────────────────────────────────────────────
  # NODE — syntax check + service tests
  # ─────────────────────────────────────────────────────────────────
  test-node:
    name: Test — Node.js
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install root deps
        run: npm ci

      - name: Install backend test deps
        run: |
          npm install --no-save better-sqlite3@12.9.0
          # Backend deps (express, multer, better-sqlite3 native build) so node
          # tests that load backend modules (e.g. test_update_endpoint_auth.js →
          # routes/system-ops) resolve. NO --ignore-scripts: better-sqlite3 needs
          # its native build step (backend has no custom install scripts).
          npm --prefix backend install

      - name: Node syntax check — backend/server.js
        run: node --check backend/server.js

      - name: Run audit/economy service tests
        run: node tests/test_audit_economy_services.js

      - name: Run rate-limit cache tests
        run: node tests/test_rate_limit_cache.js

      - name: Run agent real-completion tests
        run: node tests/test_agent_real_completion.js

      - name: Run desktop boot-contract tests (F1 + F2)
        run: node tests/test_boot_contract_routes.js

      - name: Run memory trust-gate tests (C4)
        run: node tests/test_memory_trust_gate.js

      - name: Run compute dispatch + egress-guard tests (D1)
        run: node tests/test_compute_dispatch.js

      - name: Run forge codegen extraction tests (dangling-fence regression)
        run: node tests/test_forge_codegen_extract.js

      - name: Run system halt/restart tests (phantom runtimeState.agents regression)
        run: node tests/test_system_halt_restart.js

      - name: Run forge queue consolidation tests (TQ-1)
        run: node tests/test_forge_queue_consolidation.js

      - name: Run system update endpoint auth regression test
        run: node tests/test_update_endpoint_auth.js

      - name: Run Kokoro voice adapter test
        run: node tests/test_kokoro_voice.js

      - name: Run route-auth scanner unit tests (M1)
        run: node tests/test_route_auth_scanner.js

      - name: Run JWT algorithm-pin regression test (M1)
        run: node tests/test_jwt_alg_pin.js

      - name: Run workspace upload router unit tests
        run: node tests/test_upload_unit.js

      - name: Run workspace routes regression tests (tenant fail-closed + exact-match)
        run: node tests/test_workspace_routes.js

  # ─────────────────────────────────────────────────────────────────
  # FRONTEND BUILD CHECK
  # ─────────────────────────────────────────────────────────────────
  build-frontend:
    name: Build — Frontend (Vite)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install and build
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Verify dist output
        run: |
          if [ ! -d frontend/dist ] || [ -z "$(ls -A frontend/dist)" ]; then
            echo "ERROR: frontend/dist missing or empty"
            exit 1
          fi
          echo "frontend/dist OK — $(find frontend/dist -type f | wc -l) files"

  # ─────────────────────────────────────────────────────────────────
  # SECURITY SCAN (advisory, non-blocking)
  # ─────────────────────────────────────────────────────────────────
  security-scan:
    name: Security Scan (bandit)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install bandit
        run: pip install bandit -q

      - name: Bandit static analysis
        run: bandit -r runtime/ -ll -q || true
        continue-on-error: true

  # ─────────────────────────────────────────────────────────────────
  # ROUTE AUTH SCANNER (advisory, non-blocking) — M1
  # Flags any sensitive Express route lacking an auth guard. Policy in
  # runtime/config/security.yml (route_auth). Fail-closed on missing config.
  # Promote to blocking (add to all-green needs) once stable — see
  # docs/governance/IMPLEMENTATION_PLAN.md (module 1).
  # ─────────────────────────────────────────────────────────────────
  route-auth-scan:
    name: Route Auth Scanner (advisory)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Scan route auth coverage
        run: node backend/security/route_auth_scanner.js --json | tee route-auth-report.json
        continue-on-error: true

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: route-auth-report
          path: route-auth-report.json
          retention-days: 30

  # ─────────────────────────────────────────────────────────────────
  # GATE — all required checks must pass
  # ─────────────────────────────────────────────────────────────────
  all-green:
    name: All Checks Passed
    runs-on: ubuntu-latest
    needs: [test-python, test-node, build-frontend]
    if: always()

    steps:
      - name: Evaluate required job outcomes
        run: |
          results='${{ toJSON(needs) }}'
          echo "Job results: $results"

          failed=false
          for job in test-python test-node build-frontend; do
            result=$(echo "$results" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          job = '${job}'
          for k, v in data.items():
              if k == job:
                  print(v['result'])
                  break
          else:
              print('missing')
          ")
            echo "  $job: $result"
            if [ "$result" != "success" ]; then
              echo "FAIL: $job did not succeed (result: $result)"
              failed=true
            fi
          done

          if [ "$failed" = "true" ]; then exit 1; fi
          echo "All required checks passed."
