name: CI

"on":
  push:
    branches: [main]
  pull_request:
    branches: [main]

defaults:
  run:
    shell: bash

permissions:
  contents: read

env:
  STATE_DIR: /tmp/ci-state
  JWT_SECRET_KEY: ci-test-secret-not-real
  STRICT_PIPELINE: "0"
  LOG_LEVEL: WARNING
  EVOLUTION_MODE: "OFF"

jobs:
  # ─────────────────────────────────────────────────────────────────
  # PYTHON LINT
  # ─────────────────────────────────────────────────────────────────
  lint-python:
    name: Lint — Python
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install core deps
        run: pip install -r runtime/requirements-core.txt -q

      - name: Syntax-check all runtime Python files
        run: |
          find runtime/ -name '*.py' -print0 | xargs -0 python3 -m py_compile
          echo "py_compile: all files OK"

  # ─────────────────────────────────────────────────────────────────
  # PYTHON TESTS
  # ─────────────────────────────────────────────────────────────────
  test-python:
    name: Test — Python (pytest)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: lint-python

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install runtime + test deps
        run: |
          pip install -r runtime/requirements-core.txt \
                      -r requirements-test.txt -q

      - name: Run pytest
        run: |
          python3 -m pytest tests/ \
            -q \
            --timeout=60 \
            --ignore=tests/ui_automation \
            --ignore=tests/ui_e2e \
            -x \
            --tb=short

  # ─────────────────────────────────────────────────────────────────
  # NODE — syntax check + service tests
  # ─────────────────────────────────────────────────────────────────
  test-node:
    name: Test — Node.js
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install root deps
        run: npm ci

      - name: Install backend test deps
        run: npm install --no-save better-sqlite3@12.9.0

      - name: Node syntax check — backend/server.js
        run: node --check backend/server.js

      - name: Run audit/economy service tests
        run: node tests/test_audit_economy_services.js

      - name: Run rate-limit cache tests
        run: node tests/test_rate_limit_cache.js

  # ─────────────────────────────────────────────────────────────────
  # FRONTEND BUILD CHECK
  # ─────────────────────────────────────────────────────────────────
  build-frontend:
    name: Build — Frontend (Vite)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install and build
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Verify dist output
        run: |
          if [ ! -d frontend/dist ] || [ -z "$(ls -A frontend/dist)" ]; then
            echo "ERROR: frontend/dist missing or empty"
            exit 1
          fi
          echo "frontend/dist OK — $(find frontend/dist -type f | wc -l) files"

  # ─────────────────────────────────────────────────────────────────
  # SECURITY SCAN (advisory, non-blocking)
  # ─────────────────────────────────────────────────────────────────
  security-scan:
    name: Security Scan (bandit)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install bandit
        run: pip install bandit -q

      - name: Bandit static analysis
        run: bandit -r runtime/ -ll -q || true
        continue-on-error: true

  # ─────────────────────────────────────────────────────────────────
  # GATE — all required checks must pass
  # ─────────────────────────────────────────────────────────────────
  all-green:
    name: All Checks Passed
    runs-on: ubuntu-latest
    needs: [test-python, test-node, build-frontend]
    if: always()

    steps:
      - name: Evaluate required job outcomes
        run: |
          results='${{ toJSON(needs) }}'
          echo "Job results: $results"

          failed=false
          for job in test-python test-node build-frontend; do
            result=$(echo "$results" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          job = '${job}'
          for k, v in data.items():
              if k == job:
                  print(v['result'])
                  break
          else:
              print('missing')
          ")
            echo "  $job: $result"
            if [ "$result" != "success" ]; then
              echo "FAIL: $job did not succeed (result: $result)"
              failed=true
            fi
          done

          if [ "$failed" = "true" ]; then exit 1; fi
          echo "All required checks passed."
