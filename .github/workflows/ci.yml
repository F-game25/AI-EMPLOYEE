name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install test dependencies
        run: pip install -r requirements-test.txt

      - name: Run pytest
        run: python3 -m pytest tests/ -q --tb=short
        env:
          CI: "true"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install backend dependencies
        run: npm install
        working-directory: backend

      - name: Node.js syntax check
        run: node --check backend/server.js

      - name: Python lint (compile check)
        run: find runtime/agents -name '*.py' -exec python3 -m py_compile {} +
