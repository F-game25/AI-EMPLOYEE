services:
  neo4j:
    image: neo4j:5.20-community
    container_name: ai-employee-neo4j
    restart: unless-stopped
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/neuralbrain
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
      NEO4J_server_memory_pagecache_size: 512M
      NEO4J_server_memory_heap_initial__size: 512M
      NEO4J_server_memory_heap_max__size: 1G
    volumes:
      - ./state/neural_brain/neo4j/data:/data
      - ./state/neural_brain/neo4j/logs:/logs
      - ./state/neural_brain/neo4j/plugins:/plugins
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # Optional: standalone Chroma server. By default, NeuralBrain uses
  # chromadb.PersistentClient in-process (no service needed). Enable this
  # only if you want a network-accessible Chroma at :8000.
  chromadb:
    image: chromadb/chroma:latest
    container_name: ai-employee-chromadb
    restart: unless-stopped
    profiles: ["with-chromadb"]
    ports:
      - "8001:8000"
    volumes:
      - ./state/neural_brain/chroma_server:/chroma/chroma
    environment:
      IS_PERSISTENT: "TRUE"
      ANONYMIZED_TELEMETRY: "FALSE"
