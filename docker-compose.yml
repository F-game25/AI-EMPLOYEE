version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: ai-employee-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ai_employee
      POSTGRES_USER: ai_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_INITDB_ARGS: -c max_connections=100 -c shared_buffers=256MB
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./runtime/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ai_user -d ai_employee"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  nginx:
    image: nginx:latest
    container_name: ai-employee-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - ai-employee
      - postgres
    healthcheck:
      test: ["CMD", "wget", "-O-", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: ai-employee-jaeger
    restart: unless-stopped
    environment:
      COLLECTOR_ZIPKIN_HOST_PORT: ":9411"
    ports:
      - "6831:6831/udp"
      - "6832:6832/udp"
      - "5778:5778"
      - "16686:16686"
      - "14268:14268"
      - "14250:14250"
      - "9411:9411"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:14268/api/traces"]
      interval: 30s
      timeout: 10s
      retries: 3

  ai-employee:
    build:
      context: .
      dockerfile: Dockerfile
    image: ai-employee:latest
    container_name: ai-employee
    restart: unless-stopped
    expose:
      - "8787"
    environment:
      NODE_ENV: production
      PORT: 8787
      PYTHON_BACKEND_PORT: 18790
      AI_HOME: /app
      LLM_BACKEND: ${LLM_BACKEND:-anthropic}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-}
      CORS_ORIGIN: ${CORS_ORIGIN:-}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      EVOLUTION_MODE: ${EVOLUTION_MODE:-SAFE}
      SENTRY_DSN: ${SENTRY_DSN:-}
      ENVIRONMENT: ${ENVIRONMENT:-production}
      DATABASE_URL: postgresql://ai_user:${POSTGRES_PASSWORD:-changeme}@postgres:5432/ai_employee
      JAEGER_ENABLED: "true"
      JAEGER_HOST: jaeger
      JAEGER_PORT: 6831
      STRIPE_MODE: sandbox
      STRIPE_API_KEY: ${STRIPE_API_KEY:-}
    volumes:
      # Persist SQLite DBs, logs, and runtime state across restarts
      - ai-state:/app/state
      - ai-logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8787/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    depends_on:
      postgres:
        condition: service_healthy
      jaeger:
        condition: service_started

volumes:
  ai-state:
    driver: local
  ai-logs:
    driver: local
  postgres-data:
    driver: local
