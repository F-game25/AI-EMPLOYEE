<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Nexus OS</title>
<style>
  :root{
    --bg:#06070d; --panel:#0b0e17; --line:#16203a; --txt:#cfe3ff; --dim:#5f7196;
    --cyan:#34e0d6; --cyan-dim:#1b6f6a; --red:#ff5d6c; --green:#39d98a; --amber:#ffc857;
    --gold:#ffd24a; --gold-deep:#f4a823;
    --font:'SF Mono','JetBrains Mono','Fira Code',ui-monospace,Menlo,Consolas,monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    background:radial-gradient(120% 120% at 50% -10%,#0c1426 0%,var(--bg) 60%);
    color:var(--txt);font-family:var(--font);overflow:hidden;user-select:none;
    display:flex;flex-direction:column;
  }
  .titlebar{height:34px;display:flex;align-items:center;justify-content:space-between;
    padding:0 12px;border-bottom:1px solid var(--line)}
  .brand{display:flex;align-items:center;gap:8px;font-size:12px;letter-spacing:.18em}
  .brand b{color:var(--cyan);font-weight:600}
  .brand .ver{color:var(--dim);font-size:11px;letter-spacing:.1em}
  .winbtn{cursor:pointer;color:var(--dim);font-size:15px;line-height:1;padding:4px 8px;border-radius:4px}
  .winbtn:hover{color:var(--red);background:#1a0d12}
  .wrap{flex:1;display:flex;flex-direction:column;padding:22px 26px;gap:18px}
  .hero{display:flex;align-items:center;gap:16px}
  .eye{width:46px;height:46px;border-radius:50%;flex:none;position:relative;
    background:radial-gradient(circle at 50% 50%,var(--gold) 0 18%,transparent 22%),
               radial-gradient(circle at 50% 50%,var(--gold-deep) 0 46%,transparent 50%);
    box-shadow:0 0 26px rgba(255,180,40,.5);animation:pulse 2.4s ease-in-out infinite}
  @keyframes pulse{0%,100%{transform:scale(1);opacity:.9}50%{transform:scale(1.06);opacity:1}}
  .hero h1{font-size:24px;letter-spacing:.32em;font-weight:700;color:var(--gold);
    text-shadow:0 0 10px rgba(255,210,74,.65),0 0 26px rgba(244,168,35,.45),0 0 52px rgba(244,168,35,.25);
    animation:goldglow 2.6s ease-in-out infinite}
  @keyframes goldglow{
    0%,100%{text-shadow:0 0 10px rgba(255,210,74,.55),0 0 24px rgba(244,168,35,.35),0 0 46px rgba(244,168,35,.18)}
    50%{text-shadow:0 0 18px rgba(255,224,128,.95),0 0 40px rgba(244,168,35,.62),0 0 76px rgba(244,168,35,.42)}}
  .hero p{color:var(--dim);font-size:12px;letter-spacing:.08em;margin-top:3px}
  .hero .tag{color:#c79a3a;font-size:10px;letter-spacing:.22em;margin-top:6px;
    text-shadow:0 0 10px rgba(244,168,35,.3)}
  /* phase rail */
  .rail{display:flex;gap:6px;align-items:stretch}
  .ph{flex:1;border:1px solid var(--line);border-radius:6px;padding:8px 9px;background:var(--panel);
    transition:border-color .3s,background .3s}
  .ph .dot{width:8px;height:8px;border-radius:50%;background:#26314d;display:inline-block;margin-right:6px;
    transition:background .3s,box-shadow .3s}
  .ph .lbl{font-size:10px;letter-spacing:.06em;color:var(--dim)}
  .ph.run{border-color:var(--cyan-dim)}
  .ph.run .dot{background:var(--amber);box-shadow:0 0 8px var(--amber);animation:blink 1s steps(2) infinite}
  .ph.ok{border-color:var(--cyan-dim)}
  .ph.ok .dot{background:var(--green);box-shadow:0 0 8px var(--green)}
  .ph.ok .lbl{color:var(--txt)}
  .ph.fail{border-color:var(--red)}
  .ph.fail .dot{background:var(--red);box-shadow:0 0 8px var(--red)}
  @keyframes blink{50%{opacity:.3}}
  /* progress */
  .bar{height:3px;background:#101a30;border-radius:3px;overflow:hidden}
  .bar > i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--cyan-dim),var(--cyan));
    transition:width .4s ease}
  /* console */
  .console{flex:1;min-height:0;background:#04060c;border:1px solid var(--line);border-radius:8px;
    display:flex;flex-direction:column}
  .console .head{display:flex;align-items:center;gap:6px;padding:6px 10px;border-bottom:1px solid var(--line)}
  .console .head i{width:9px;height:9px;border-radius:50%;display:inline-block}
  .console .head .t{margin-left:6px;color:var(--dim);font-size:10px;letter-spacing:.1em}
  .console .head .clk{margin-left:auto;color:var(--dim);font-size:10px}
  .console .body{flex:1;overflow-y:auto;padding:8px 10px;font-size:11px;line-height:1.5}
  .console .body::-webkit-scrollbar{width:6px}.console .body::-webkit-scrollbar-thumb{background:#1c2740;border-radius:3px}
  .line{white-space:pre-wrap;word-break:break-word;color:#9db4d8}
  .line.err{color:var(--red)} .line.warn{color:var(--amber)}
  .ticker{color:var(--cyan);font-size:11px;letter-spacing:.04em}
  /* diagnostics */
  .diag{display:none;flex-direction:column;gap:12px}
  .diag.show{display:flex}
  .diag h2{color:var(--red);font-size:13px;letter-spacing:.14em}
  .diag .reason{background:#15080b;border:1px solid #3a1620;border-radius:6px;padding:10px;
    color:#ffb3bb;font-size:12px;white-space:pre-wrap}
  .actions{display:flex;gap:10px}
  .btn{cursor:pointer;border:1px solid var(--cyan-dim);background:transparent;color:var(--cyan);
    font-family:var(--font);font-size:11px;letter-spacing:.1em;padding:8px 14px;border-radius:6px}
  .btn:hover{background:#06201f}
  .btn.ghost{border-color:var(--line);color:var(--dim)}
  .btn.ghost:hover{background:#0d1322;color:var(--txt)}
  .hidden{display:none!important}
</style>
</head>
<body>
  <div class="wrap">
    <div class="hero">
      <div class="eye"></div>
      <div>
        <h1>NEXUS OS</h1>
        <p class="tag">AETHERNUS NEXUS · COMMAND OPERATING SYSTEM · <span id="ver">v0.1.0</span></p>
        <p id="sub">Bringing the AI workforce online…</p>
      </div>
    </div>

    <!-- boot view -->
    <div id="bootView" style="display:flex;flex-direction:column;gap:14px;flex:1;min-height:0">
      <div class="rail" id="rail"></div>
      <div class="bar"><i id="barFill"></i></div>
      <div class="console">
        <div class="head">
          <i style="background:#ff5f56"></i><i style="background:#ffbd2e"></i><i style="background:#27c93f"></i>
          <span class="t">/boot/nexus-os</span><span class="clk" id="clk">t+0.0s</span>
        </div>
        <div class="body" id="log">
          <div class="ticker" id="ticker">▸ standing by</div>
        </div>
      </div>
    </div>

    <!-- diagnostics view -->
    <div class="diag" id="diagView">
      <h2>SYSTEM DID NOT START</h2>
      <div class="reason" id="diagReason">—</div>
      <div class="actions">
        <button class="btn" id="retryBtn">↻ RETRY</button>
        <button class="btn ghost" id="logsBtn">▤ OPEN LOGS</button>
        <button class="btn ghost" id="quitBtn">× QUIT</button>
      </div>
    </div>
  </div>

<script>
  const PHASES = [
    ["preflight","Pre-flight"],
    ["backend-spawn","Spawn services"],
    ["node-port-bound","Gateway"],
    ["health-ok","Health"],
    ["dashboard","Dashboard"],
  ];
  const railEl = document.getElementById('rail');
  const phEls = {};
  PHASES.forEach(([id,lbl])=>{
    const d=document.createElement('div');d.className='ph';d.id='ph-'+id;
    d.innerHTML='<span class="dot"></span><span class="lbl">'+lbl+'</span>';
    railEl.appendChild(d);phEls[id]=d;
  });
  const logEl=document.getElementById('log');
  const tickerEl=document.getElementById('ticker');
  const subEl=document.getElementById('sub');
  const barFill=document.getElementById('barFill');
  let completed=new Set();

  function setPhase(id,state){
    const el=phEls[id];if(!el)return;
    el.classList.remove('run','ok','fail');
    if(state)el.classList.add(state);
    if(state==='ok')completed.add(id);
    barFill.style.width=Math.round((completed.size/PHASES.length)*100)+'%';
  }
  function addLog(line,level){
    const d=document.createElement('div');
    d.className='line'+(level==='error'?' err':level==='warn'?' warn':'');
    d.textContent=line;logEl.appendChild(d);
    // cap to ~200 nodes
    while(logEl.childElementCount>201)logEl.removeChild(logEl.children[1]);
    logEl.scrollTop=logEl.scrollHeight;
  }
  // clock
  const t0=Date.now();
  setInterval(()=>{document.getElementById('clk').textContent='t+'+((Date.now()-t0)/1000).toFixed(1)+'s';},100);

  function showDiagnostics(reason){
    document.getElementById('bootView').style.display='none';
    document.getElementById('diagView').classList.add('show');
    document.getElementById('diagReason').textContent=reason||'Unknown failure';
    subEl.textContent='Boot failed — review and retry.';
  }
  function resetToBoot(){
    document.getElementById('diagView').classList.remove('show');
    document.getElementById('bootView').style.display='flex';
    completed.clear();PHASES.forEach(([id])=>setPhase(id,null));
    barFill.style.width='0%';subEl.textContent='Bringing the AI workforce online…';
    tickerEl.textContent='▸ restarting…';
  }

  // ── Tauri bridge ──────────────────────────────────────────────────────
  function bridge(){return window.__TAURI__;}
  function wire(){
    const T=bridge();
    if(!T||!T.event){ // bridge not ready yet — retry shortly
      addLog('[splash] waiting for Tauri bridge…','warn');
      return setTimeout(wire,120);
    }
    const {listen}=T.event;
    const invoke=T.core.invoke;

    listen('boot://status',e=>{const p=e.payload||{};if(p.message){tickerEl.textContent='▸ '+p.message;subEl.textContent=p.message;}});
    listen('boot://phase',e=>{const p=e.payload||{};setPhase(p.phase,p.status||'ok');if(p.label)tickerEl.textContent='▸ '+p.label;});
    listen('boot://log',e=>{const p=e.payload||{};addLog(p.line||'',p.level);});
    listen('boot://fail',e=>{const p=e.payload||{};const ph=p.phase;if(ph)setPhase(ph,'fail');showDiagnostics(p.reason);});
    listen('boot://ready',()=>{tickerEl.textContent='▸ online';subEl.textContent='Online.';});

    const on=(id,fn)=>{const el=document.getElementById(id);if(el)el.onclick=fn;};
    on('retryBtn',()=>{resetToBoot();invoke('retry_boot').catch(err=>addLog('retry failed: '+err,'error'));});
    on('logsBtn',()=>invoke('open_logs_folder').catch(()=>{}));
    on('quitBtn',()=>invoke('quit_app').catch(()=>{}));

    // pull any state we missed before listeners attached
    invoke('get_boot_state').then(s=>{
      if(!s)return;
      if(s.version)document.getElementById('ver').textContent='v'+s.version;
      (s.phases_done||[]).forEach(p=>setPhase(p,'ok'));
      (s.recent_logs||[]).forEach(l=>addLog(l));
      if(s.failed)showDiagnostics(s.fail_reason);
    }).catch(()=>{});
    addLog('[splash] bridge ready','');
  }
  wire();
</script>
</body>
</html>
