# AI Employee Reverse Proxy with Rate Limiting

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
  worker_connections 2048;
  use epoll;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent" "$http_x_forwarded_for"';

  access_log /var/log/nginx/access.log main;
  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;
  keepalive_timeout 65;
  types_hash_max_size 2048;
  client_max_body_size 64k;

  # Rate limiting zones (different tiers per endpoint)
  # Zone 1: Authentication (5 req/min per IP)
  limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/m;

  # Zone 2: API (100 req/min per IP)
  limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/m;

  # Zone 3: Chat/LLM (30 req/min per IP)
  limit_req_zone $binary_remote_addr zone=chat_limit:10m rate=30r/m;

  # Zone 4: WebSocket (no limit, tracked separately)
  limit_req_zone $binary_remote_addr zone=ws_limit:10m rate=10r/m;

  # Upstream backends
  upstream ai_node_backend {
    server 127.0.0.1:8787 max_fails=3 fail_timeout=10s;
    keepalive 32;
  }

  upstream ai_python_backend {
    server 127.0.0.1:18790 max_fails=3 fail_timeout=10s;
    keepalive 32;
  }

  # Main server block (HTTP → HTTPS redirect in production)
  server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # Redirect to HTTPS in production (comment out for local dev)
    # return 301 https://$server_name$request_uri;

    # Health check endpoint (no rate limiting)
    location /health {
      proxy_pass http://ai_node_backend;
      proxy_http_version 1.1;
      proxy_set_header Connection "keep-alive";
      access_log off;
    }

    location /metrics {
      proxy_pass http://ai_node_backend;
      proxy_http_version 1.1;
      proxy_set_header Connection "keep-alive";
      access_log off;
    }

    # Authentication routes (strict rate limit)
    location ~ ^/api/auth/(register|login|refresh) {
      limit_req zone=auth_limit burst=2 nodelay;
      limit_req_status 429;

      proxy_pass http://ai_node_backend;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Connection "keep-alive";
    }

    # Chat / LLM routes (moderate rate limit)
    location /api/chat {
      limit_req zone=chat_limit burst=5 nodelay;
      limit_req_status 429;

      proxy_pass http://ai_node_backend;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Connection "keep-alive";
      proxy_read_timeout 60s;
      proxy_connect_timeout 10s;
    }

    # WebSocket upgrade (limited rate, handled specially)
    location /ws {
      limit_req zone=ws_limit burst=10 nodelay;
      limit_req_status 429;

      proxy_pass http://ai_node_backend;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 3600s;
      proxy_send_timeout 3600s;
      proxy_connect_timeout 10s;
      # Disable buffering for WebSocket
      proxy_buffering off;
      proxy_request_buffering off;
    }

    # All other API routes (standard rate limit)
    location /api/ {
      limit_req zone=api_limit burst=20 nodelay;
      limit_req_status 429;

      proxy_pass http://ai_node_backend;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Connection "keep-alive";
      proxy_read_timeout 30s;
      proxy_connect_timeout 10s;
    }

    # Static frontend assets (high cache)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
      proxy_pass http://ai_node_backend;
      proxy_cache_valid 200 30d;
      proxy_cache_bypass $http_pragma $http_authorization;
      add_header Cache-Control "public, max-age=2592000, immutable";
      access_log off;
    }

    # Default: proxy to Node backend
    location / {
      proxy_pass http://ai_node_backend;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Connection "keep-alive";
    }

    # Error pages
    error_page 429 /429.html;
    location = /429.html {
      default_type application/json;
      return 429 '{"error":"Too many requests","retry_after":60}';
    }

    error_page 502 503 504 /50x.html;
    location = /50x.html {
      default_type application/json;
      return 503 '{"error":"Service temporarily unavailable","status":"degraded"}';
    }
  }

  # HTTPS server block (uncomment in production with valid certificates)
  # server {
  #   listen 443 ssl http2 default_server;
  #   listen [::]:443 ssl http2 default_server;
  #   server_name _;
  #
  #   ssl_certificate /etc/letsencrypt/live/your-domain.com/fullchain.pem;
  #   ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;
  #   ssl_session_timeout 1d;
  #   ssl_session_cache shared:SSL:50m;
  #   ssl_session_tickets off;
  #   ssl_protocols TLSv1.2 TLSv1.3;
  #   ssl_ciphers HIGH:!aNULL:!MD5;
  #   ssl_prefer_server_ciphers on;
  #
  #   # Same location blocks as HTTP server above
  # }
}
