<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="40%" r="65%">
      <stop offset="0%"   stop-color="#0d0e18"/>
      <stop offset="60%"  stop-color="#06070d"/>
      <stop offset="100%" stop-color="#020306"/>
    </radialGradient>
    <radialGradient id="haloGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#ffb84d" stop-opacity="0.55"/>
      <stop offset="55%"  stop-color="#e5c76b" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#000"    stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="irisGrad" cx="50%" cy="50%" r="50%">
      <stop offset="22%"  stop-color="#1c1306"/>
      <stop offset="24%"  stop-color="#ffd97a"/>
      <stop offset="34%"  stop-color="#e5c76b"/>
      <stop offset="60%"  stop-color="#b8923f" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#000"    stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="pupilGrad" cx="50%" cy="50%" r="50%">
      <stop offset="50%"  stop-color="#04050a"/>
      <stop offset="100%" stop-color="#04050a" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Rounded square background, app-icon style -->
  <rect x="64" y="64" width="896" height="896" rx="180" ry="180" fill="url(#bgGrad)" stroke="#e5c76b" stroke-opacity="0.25" stroke-width="3"/>

  <!-- Outer halo -->
  <circle cx="512" cy="512" r="420" fill="url(#haloGrad)"/>

  <!-- 24 fin sunburst around the iris -->
  <g transform="translate(512 512)" fill="#e5c76b" opacity="0.5">
    <g id="fins">
      <rect x="-3" y="-310" width="6" height="60" rx="2"/>
    </g>
    <use href="#fins" transform="rotate(15)"/>
    <use href="#fins" transform="rotate(30)"/>
    <use href="#fins" transform="rotate(45)"/>
    <use href="#fins" transform="rotate(60)"/>
    <use href="#fins" transform="rotate(75)"/>
    <use href="#fins" transform="rotate(90)"/>
    <use href="#fins" transform="rotate(105)"/>
    <use href="#fins" transform="rotate(120)"/>
    <use href="#fins" transform="rotate(135)"/>
    <use href="#fins" transform="rotate(150)"/>
    <use href="#fins" transform="rotate(165)"/>
    <use href="#fins" transform="rotate(180)"/>
    <use href="#fins" transform="rotate(195)"/>
    <use href="#fins" transform="rotate(210)"/>
    <use href="#fins" transform="rotate(225)"/>
    <use href="#fins" transform="rotate(240)"/>
    <use href="#fins" transform="rotate(255)"/>
    <use href="#fins" transform="rotate(270)"/>
    <use href="#fins" transform="rotate(285)"/>
    <use href="#fins" transform="rotate(300)"/>
    <use href="#fins" transform="rotate(315)"/>
    <use href="#fins" transform="rotate(330)"/>
    <use href="#fins" transform="rotate(345)"/>
  </g>

  <!-- Outer ring -->
  <circle cx="512" cy="512" r="280" fill="none" stroke="#e5c76b" stroke-width="2" opacity="0.4"/>
  <circle cx="512" cy="512" r="240" fill="none" stroke="#e5c76b" stroke-width="3" opacity="0.7"/>

  <!-- Iris -->
  <circle cx="512" cy="512" r="220" fill="url(#irisGrad)"/>

  <!-- Iris striations (8 spokes) -->
  <g transform="translate(512 512)" stroke="#1c1306" stroke-width="3" opacity="0.6">
    <line x1="0" y1="-180" x2="0" y2="-90"/>
    <line x1="0" y1="180"  x2="0" y2="90"/>
    <line x1="-180" y1="0" x2="-90" y2="0"/>
    <line x1="180"  y1="0" x2="90"  y2="0"/>
    <line x1="-127" y1="-127" x2="-64" y2="-64"/>
    <line x1="127"  y1="127"  x2="64"  y2="64"/>
    <line x1="-127" y1="127"  x2="-64" y2="64"/>
    <line x1="127"  y1="-127" x2="64"  y2="-64"/>
  </g>

  <!-- Pupil -->
  <circle cx="512" cy="512" r="90" fill="url(#pupilGrad)"/>

  <!-- Catchlight -->
  <ellipse cx="478" cy="478" rx="22" ry="14" fill="#fff" opacity="0.55"/>
  <ellipse cx="540" cy="540" rx="8"  ry="5"  fill="#fff" opacity="0.35"/>
</svg>
